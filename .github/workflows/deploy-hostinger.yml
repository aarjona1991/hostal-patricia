# Despliegue a Hostinger VPS: copia el repo por rsync + build remoto (npm ci / build / pm2).
# NO hace falta git clone en el servidor: basta SSH y HOSTINGER_DEPLOY_PATH (carpeta destino).
# El .env del VPS no se toca (no va en el repo; rsync sin --delete).
#
# Secretos (Settings - Secrets and variables - Actions):
#   HOSTINGER_HOST, HOSTINGER_USER, HOSTINGER_SSH_KEY, HOSTINGER_DEPLOY_PATH
# Opcional: HOSTINGER_SSH_PORT (por defecto 22)

name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      git_ref:
        description: Rama o SHA a desplegar (solo al disparar manual)
        required: false
        default: "main"

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-build:
    name: Verificar build (CI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: npm ci
        run: npm ci

      - name: npm run build
        run: npm run build

  deploy:
    name: Rsync + build en VPS
    needs: verify-build
    runs-on: ubuntu-latest
    steps:
      - name: Comprobar secretos obligatorios
        run: |
          set -e
          missing=""
          [ -n "${{ secrets.HOSTINGER_HOST }}" ] || missing="$missing HOSTINGER_HOST"
          [ -n "${{ secrets.HOSTINGER_USER }}" ] || missing="$missing HOSTINGER_USER"
          [ -n "${{ secrets.HOSTINGER_SSH_KEY }}" ] || missing="$missing HOSTINGER_SSH_KEY"
          [ -n "${{ secrets.HOSTINGER_DEPLOY_PATH }}" ] || missing="$missing HOSTINGER_DEPLOY_PATH"
          if [ -n "$missing" ]; then
            echo "::error::Faltan secretos en el repositorio:$missing"
            exit 1
          fi

      - name: Checkout (mismo codigo que se sube al VPS)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.git_ref || github.sha }}

      - name: Preparar SSH y rsync al VPS
        env:
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
          SSH_PATH: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT != '' && secrets.HOSTINGER_SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_deploy_key
          chmod 600 ~/.ssh/hostinger_deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          QPATH=$(printf '%q' "$SSH_PATH")
          ssh -i "$HOME/.ssh/hostinger_deploy_key" -p "$SSH_PORT" \
            -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -o BatchMode=yes \
            "${SSH_USER}@${SSH_HOST}" "mkdir -p $QPATH"
          RSYNC_RSH="ssh -i $HOME/.ssh/hostinger_deploy_key -p $SSH_PORT -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -o BatchMode=yes"
          rsync -az \
            --exclude node_modules \
            --exclude '.git' \
            --exclude frontend/dist \
            --exclude backend/dist \
            -e "$RSYNC_RSH" \
            ./ "${SSH_USER}@${SSH_HOST}:${SSH_PATH}/"
          echo ">>> Rsync terminado."

      - name: SSH - npm ci, build y pm2
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT != '' && secrets.HOSTINGER_SSH_PORT || '22' }}
          command_timeout: 25m
          debug: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.HOSTINGER_DEPLOY_PATH }}"
            echo ">>> DEPLOY_PATH length: ${#DEPLOY_PATH} (si es 0, el secreto HOSTINGER_DEPLOY_PATH está vacío)"
            if [ -z "$DEPLOY_PATH" ]; then
              echo "::error::HOSTINGER_DEPLOY_PATH está vacío en GitHub Secrets"
              exit 1
            fi
            if [ ! -d "$DEPLOY_PATH" ]; then
              echo "::error::No existe el directorio: $DEPLOY_PATH"
              exit 1
            fi
            cd "$DEPLOY_PATH"
            if [ ! -f deploy/remote-deploy.sh ]; then
              echo "::error::No está deploy/remote-deploy.sh bajo $DEPLOY_PATH (¿rsync o path mal?)"
              ls -la
              exit 1
            fi
            export DEPLOY_SKIP_GIT=1
            bash deploy/remote-deploy.sh
