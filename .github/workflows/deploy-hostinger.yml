# Despliegue por SSH al VPS Hostinger: build en el servidor tras alinear con origin.
#
# Secretos (Settings - Secrets and variables - Actions):
#   HOSTINGER_HOST, HOSTINGER_USER, HOSTINGER_SSH_KEY, HOSTINGER_DEPLOY_PATH
# Opcional: HOSTINGER_SSH_PORT (por defecto 22)

name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      git_ref:
        description: Rama en origin a desplegar
        required: false
        default: "main"

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-build:
    name: Verificar build (CI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: npm ci
        run: npm ci

      - name: npm run build
        run: npm run build

  deploy:
    name: Desplegar por SSH
    needs: verify-build
    runs-on: ubuntu-latest
    env:
      GIT_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.git_ref || github.ref_name }}
    steps:
      - name: Comprobar secretos obligatorios
        run: |
          set -e
          missing=""
          [ -n "${{ secrets.HOSTINGER_HOST }}" ] || missing="$missing HOSTINGER_HOST"
          [ -n "${{ secrets.HOSTINGER_USER }}" ] || missing="$missing HOSTINGER_USER"
          [ -n "${{ secrets.HOSTINGER_SSH_KEY }}" ] || missing="$missing HOSTINGER_SSH_KEY"
          [ -n "${{ secrets.HOSTINGER_DEPLOY_PATH }}" ] || missing="$missing HOSTINGER_DEPLOY_PATH"
          if [ -n "$missing" ]; then
            echo "::error::Faltan secretos en el repositorio:$missing"
            exit 1
          fi

      - name: SSH - desplegar en el VPS
        uses: appleboy/ssh-action@v1.2.5
        env:
          GIT_REF: ${{ env.GIT_REF }}
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT != '' && secrets.HOSTINGER_SSH_PORT || '22' }}
          envs: GIT_REF
          command_timeout: 25m
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.HOSTINGER_DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ] || [ ! -d "$DEPLOY_PATH" ]; then
              echo "ERROR: HOSTINGER_DEPLOY_PATH no existe o no es un directorio en el VPS: ${DEPLOY_PATH:-<vacío>}"
              exit 1
            fi
            cd "$DEPLOY_PATH"
            if [ ! -f deploy/remote-deploy.sh ]; then
              echo "ERROR: No se encuentra deploy/remote-deploy.sh (¿git clone del repo en $DEPLOY_PATH?)"
              exit 1
            fi
            bash deploy/remote-deploy.sh
