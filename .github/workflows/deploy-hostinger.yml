# Despliegue por SSH al VPS Hostinger: build en el servidor tras alinear con origin.
#
# Secretos del repositorio (Settings → Secrets and variables → Actions):
#   HOSTINGER_HOST          — IP o dominio del VPS
#   HOSTINGER_USER          — usuario SSH (p. ej. root o ubuntu)
#   HOSTINGER_SSH_KEY       — clave privada OpenSSH (PEM), línea completa desde -----BEGIN
#   HOSTINGER_DEPLOY_PATH   — ruta absoluta del clone en el VPS (p. ej. /var/www/hostal-patricia)
# Opcionales:
#   HOSTINGER_SSH_PORT      — puerto SSH (por defecto 22 si no existe el secreto)

name: Deploy to Hostinger

# Cada push a main despliega (incluye merge de PR, squash o merge commit: todos hacen push a main).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      git_ref:
        description: Rama en origin a desplegar
        required: false
        default: main

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  verify-build:
    name: Verificar build (CI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: npm ci
        run: npm ci

      - name: npm run build
        run: npm run build

  deploy:
    name: Desplegar por SSH
    needs: verify-build
    runs-on: ubuntu-latest
    env:
      GIT_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.git_ref || github.ref_name }}
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.5
        env:
          GIT_REF: ${{ env.GIT_REF }}
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || '22' }}
          envs: GIT_REF
          command_timeout: 25m
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.HOSTINGER_DEPLOY_PATH }}"
            bash deploy/remote-deploy.sh
